name: Instrumented tests

# Reusable workflow: boots an emulator for a given API level / profile, runs an
# instrumented Gradle task, and (optionally) publishes coverage. Called by test.yml
# for both the coverage run and the compatibility matrix.
on:
  workflow_call:
    inputs:
      api-level:
        description: Emulator API level
        required: true
        type: number
      profile:
        description: Emulator device profile (e.g. medium_phone)
        required: true
        type: string
      gradle-task:
        description: Instrumented Gradle task to run on the emulator
        required: true
        type: string
      coverage:
        description: Whether to publish Jacoco coverage and run SonarQube
        required: false
        type: boolean
        default: false
      artifact-name:
        description: Name of the uploaded test-report artifact
        required: true
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  instrumented:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      EMULATOR_TARGET: google_apis
      EMULATOR_ARCH: x86_64
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up JDK 21
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          java-version: "21"
          distribution: temurin
          cache: gradle
      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - name: Enable KVM group perms
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: AVD cache
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-${{ inputs.api-level }}-${{ env.EMULATOR_TARGET }}-${{ env.EMULATOR_ARCH }}-${{ inputs.profile }}

      - name: Create AVD and generate snapshot for caching
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@e89f39f1abbbd05b1113a29cf4db69e7540cae5a # v2.37.0
        with:
          api-level: ${{ inputs.api-level }}
          arch: ${{ env.EMULATOR_ARCH }}
          target: ${{ env.EMULATOR_TARGET }}
          profile: ${{ inputs.profile }}
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none -no-metrics
          disable-animations: true
          script: echo "Generated AVD snapshot for caching."

      - name: Run device tests
        uses: reactivecircus/android-emulator-runner@e89f39f1abbbd05b1113a29cf4db69e7540cae5a # v2.37.0
        with:
          api-level: ${{ inputs.api-level }}
          profile: ${{ inputs.profile }}
          arch: ${{ env.EMULATOR_ARCH }}
          target: ${{ env.EMULATOR_TARGET }}
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none -no-metrics
          disable-animations: true
          script: |
            ./gradlew packageFullDebug packageFullDebugUnitTest
            adb shell input keyevent 3
            adb shell settings put secure long_press_timeout 1500
            adb uninstall com.futsch1.medtimer || true
            adb shell settings put global auto_time 0
            adb shell su 0 toybox date 0801160025
            EXIT_CODE=0 && ./gradlew ${{ inputs.gradle-task }} || EXIT_CODE=$? && (adb pull /sdcard/googletest/test_outputfiles app/build/outputs/androidTest-results/ || true) && exit $EXIT_CODE
          # ubuntu-latest is limited to 2 cores
          cores: 2

      - name: Upload coverage to Qlty
        if: inputs.coverage && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
        uses: qltysh/qlty-action/coverage@fd52dc852530a708d68c3b7342f8d33d1df4cd55 # v2.2.1
        env:
          JACOCO_SOURCE_PATH: app/src/main/java app/build/generated/java/generateSafeArgsFullDebug app/build/generated/ap_generated_sources/fullDebug/out
        with:
          oidc: true
          files: app/build/reports/jacoco/JacocoDebugCodeCoverage/JacocoDebugCodeCoverage.xml

      - name: SonarQube
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        if: ${{ inputs.coverage && env.SONAR_TOKEN != '' }}
        run: ./gradlew sonar

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: ${{ inputs.artifact-name }}
          path: |
            app/build/reports/jacoco/JacocoDebugCodeCoverage/html
            app/build/reports/androidTest/connected/fullDebug
            app/build/outputs/androidTest-results
