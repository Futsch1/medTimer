name: Test

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Cancel in-progress runs when new commits are pushed to the same branch/PR.
# Keep main and release tags running to completion.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' && !startsWith(github.ref, 'refs/tags/') }}

permissions:
  contents: read
  id-token: write

# Staged pipeline: lint -> unit tests -> compile -> instrumented fan-out.
# The instrumented jobs (coverage run + compatibility matrix) only start once
# lint, unit tests and the compile step have all succeeded.
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up JDK 21
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          java-version: "21"
          distribution: temurin
          cache: gradle
      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
      - name: Android lint
        run: ./gradlew lint
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: LintReports
          path: app/build/reports/lint-results-fullDebug.html

  unit-tests:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up JDK 21
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          java-version: "21"
          distribution: temurin
          cache: gradle
      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - name: Run fuzzing tests (both variants)
        run: ./gradlew testFullDebug testFossDebug -Dfuzzing=true

      - name: Run FOSS unit tests
        run: ./gradlew testFossDebugUnitTest

      # The fuzzing step above runs :app's full-flavor tests with include("**/*FuzzTest.class"), so the
      # normal full-only unit tests (e.g. app/src/testFull GMS tests) run nowhere else. Run them here
      # without -Dfuzzing, which reverts to exclude("**/*FuzzTest.class").
      - name: Run full unit tests
        run: ./gradlew testFullDebugUnitTest

      # The flavored test tasks above only exist in modules with the full/foss flavors (:app, :feature:*).
      # The flavor-agnostic library modules (:core:*) name their tests testDebugUnitTest, so run them too.
      - name: Run library module unit tests
        run: ./gradlew testDebugUnitTest

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: UnitTestReports
          path: |
            app/build/reports/tests/testFullDebugUnitTest
            app/build/reports/tests/testFossDebugUnitTest
            core/ui/build/reports/tests/testDebugUnitTest
            core/database/build/reports/tests/testDebugUnitTest

  compile-test:
    needs: unit-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up JDK 21
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          java-version: "21"
          distribution: temurin
          cache: gradle
      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
      - name: Compile (assemble both flavors)
        run: ./gradlew assembleDebug

  # Coverage instrumented run (single config) — gated behind compile-test.
  coverage-instrumented:
    needs: compile-test
    uses: ./.github/workflows/instrumentedTests.yml
    with:
      api-level: 36
      profile: medium_phone
      gradle-task: jacocoFullDebugCodeCoverage
      coverage: true
      artifact-name: TestReports
    secrets: inherit

  # Compatibility instrumented fan-out (API x form-factor) — gated behind compile-test.
  # Note: API 36 / medium_phone overlaps with coverage-instrumented above; redundancy left intentionally.
  compatibility-instrumented:
    needs: compile-test
    strategy:
      fail-fast: false
      matrix:
        api-level: [ 28, 36 ]
        profile: [ medium_phone, small_tablet ]
    uses: ./.github/workflows/instrumentedTests.yml
    with:
      api-level: ${{ matrix.api-level }}
      profile: ${{ matrix.profile }}
      gradle-task: connectedFullDebugAndroidTest
      coverage: false
      artifact-name: Test reports ${{ matrix.profile }} ${{ matrix.api-level }}
    secrets: inherit
