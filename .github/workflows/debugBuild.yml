name: Debug build

# On-demand debug APK for manual testing (e.g. on a feature branch before merge).
# Unlike build.yml, this needs no signing secrets: debug builds are self-signed
# with the auto-generated debug keystore.
#
# Triggers on push to this feature branch too, since GitHub only offers manual
# workflow_dispatch runs for workflow files that already exist on the default
# branch - remove the push trigger (or the branch filter) once this merges.
on:
  workflow_dispatch:
  push:
    branches:
      - claude/barcode-entity-data-layer-y9tt6d

env:
  FULL_APK_DEBUG_DIRECTORY: app/build/outputs/apk/full/debug
  FOSS_APK_DEBUG_DIRECTORY: app/build/outputs/apk/foss/debug

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up JDK 21
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          java-version: "21"
          distribution: temurin
          cache: gradle
      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - name: Assemble debug APKs
        run: ./gradlew :app:assembleFullDebug :app:assembleFossDebug

      - name: Upload Full debug APK
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: apk-full-debug
          path: ${{ env.FULL_APK_DEBUG_DIRECTORY }}/*.apk

      - name: Upload FOSS debug APK
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: apk-foss-debug
          path: ${{ env.FOSS_APK_DEBUG_DIRECTORY }}/*.apk
