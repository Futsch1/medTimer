name: Build

on:
  workflow_dispatch:
  push:
  pull_request:
    branches: [main]

env:
  FULL_APK_RELEASE_DIRECTORY: app/build/outputs/apk/full/release
  FOSS_APK_RELEASE_DIRECTORY: app/build/outputs/apk/foss/release
  FULL_AAB_RELEASE_DIRECTORY: app/build/outputs/bundle/fullRelease
  BUILD_TOOLS_HOME: /usr/local/lib/android/sdk/build-tools

permissions:
  contents: read

jobs:
  build:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository)
    runs-on: ubuntu-latest
    permissions: write-all

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: "21"
          distribution: temurin
          cache: gradle
      - uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0
        with:
          dependency-graph: generate-and-submit

      - name: Release
        run: ./gradlew assembleRelease
      - name: Release bundle
        run: ./gradlew bundleRelease

      - name: Sign Full AAB
        run: |
          echo -n "${{ secrets.SIGNING_KEYSTORE }}" | base64 --decode >> $FULL_AAB_RELEASE_DIRECTORY/signingKey.jks
          jarsigner -keystore $FULL_AAB_RELEASE_DIRECTORY/signingKey.jks -storepass ${{ secrets.SIGNING_KEYSTORE_PASSWORD }} \
            -keypass ${{ secrets.SIGNING_ALIAS_PASSWORD }} $FULL_AAB_RELEASE_DIRECTORY/MedTimer-full-release.aab ${{ secrets.SIGNING_ALIAS }}
        continue-on-error: true
      - name: Upload Full App Bundle
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: aab-full
          path: ${{env.FULL_AAB_RELEASE_DIRECTORY}}/MedTimer-full-release.aab

      - name: Setup build tool version variable
        shell: bash
        run: |
          BUILD_TOOLS_VERSION=$(ls $BUILD_TOOLS_HOME | tail -1)
          echo "BUILD_TOOLS_PATH=$BUILD_TOOLS_HOME/$BUILD_TOOLS_VERSION" >> $GITHUB_ENV

      - name: Sign Full APK
        run: |
          echo -n "${{ secrets.SIGNING_KEYSTORE }}" | base64 --decode >> $FULL_APK_RELEASE_DIRECTORY/signingKey.jks
          ${{ env.BUILD_TOOLS_PATH }}/apksigner sign --ks $FULL_APK_RELEASE_DIRECTORY/signingKey.jks --ks-key-alias ${{ secrets.SIGNING_ALIAS }} \
            --alignment-preserved \
            --ks-pass pass:${{ secrets.SIGNING_KEYSTORE_PASSWORD }} --key-pass pass:${{ secrets.SIGNING_ALIAS_PASSWORD }} \
            --out $FULL_APK_RELEASE_DIRECTORY/MedTimer-full-release-signed.apk \
            $FULL_APK_RELEASE_DIRECTORY/MedTimer-full-release-unsigned.apk
          rm $FULL_APK_RELEASE_DIRECTORY/MedTimer-full-release-unsigned.apk
        continue-on-error: true
      - name: Upload Full App Package
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: apk-full
          path: ${{env.FULL_APK_RELEASE_DIRECTORY}}/MedTimer-full-release-signed.apk

      - name: Sign FOSS APK
        run: |
          echo -n "${{ secrets.SIGNING_KEYSTORE }}" | base64 --decode >> $FOSS_APK_RELEASE_DIRECTORY/signingKey.jks
          ${{ env.BUILD_TOOLS_PATH }}/apksigner sign --ks $FOSS_APK_RELEASE_DIRECTORY/signingKey.jks --ks-key-alias ${{ secrets.SIGNING_ALIAS }} \
            --alignment-preserved \
            --ks-pass pass:${{ secrets.SIGNING_KEYSTORE_PASSWORD }} --key-pass pass:${{ secrets.SIGNING_ALIAS_PASSWORD }} \
            --out $FOSS_APK_RELEASE_DIRECTORY/MedTimer-foss-release-signed.apk \
            $FOSS_APK_RELEASE_DIRECTORY/MedTimer-foss-release-unsigned.apk
          rm $FOSS_APK_RELEASE_DIRECTORY/MedTimer-foss-release-unsigned.apk
        continue-on-error: true
      - name: Upload FOSS App Package
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: apk-foss
          path: ${{env.FOSS_APK_RELEASE_DIRECTORY}}/MedTimer-foss-release-signed.apk

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: ncipollo/release-action@339a81892b84b4eeb0f6e744e4574d79d0d9b8dd # v1.21.0
        with:
          artifacts: ${{env.FULL_AAB_RELEASE_DIRECTORY}}/*.aab,${{env.FULL_APK_RELEASE_DIRECTORY}}/*.apk,${{env.FOSS_APK_RELEASE_DIRECTORY}}/*.apk
          generateReleaseNotes: true
